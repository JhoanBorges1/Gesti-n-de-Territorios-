<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Territorios | Vista Al Mar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="auth-container" class="auth-wrapper">
        <div class="login-card">
            <img src="https://www.gstatic.com/images/branding/googlelogo/svg/googlelogo_clr_74x24dp.svg" alt="Logo" class="auth-logo">
            <h2>Iniciar Sesión</h2>
            <p>Acceso exclusivo para administradores</p>
            
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-primary full-width">Entrar al Sistema</button>
            </form>
            
            <p id="auth-msg" class="status-msg"></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="main-header">
            <div class="header-placeholder"></div>
            <h1>Vista Al Mar | Territorios</h1>
            <button class="btn-danger-outline" onclick="handleLogout()">Salir</button>
        </header>

        <nav class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('tab-agenda')">Agenda</button>
            <button class="tab-btn" onclick="switchTab('tab-personal')">Personal</button>
            <button class="tab-btn" onclick="switchTab('tab-territorios')">Territorios</button>
            <button class="tab-btn" onclick="switchTab('tab-config')">Grupos</button>
        </nav>

        <main class="container">
            <div id="tab-agenda" class="tab-content active"></div>
            <div id="tab-personal" class="tab-content"></div>
            <div id="tab-territorios" class="tab-content"></div>
            <div id="tab-config" class="tab-content"></div>
        </main>
    </div>

    <div id="modal-container"></div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
