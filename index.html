<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Territorios | Vista Al Mar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="auth-container" class="auth-wrapper">
        <div class="login-card">
            <img src="https://www.gstatic.com/images/branding/googlelogo/svg/googlelogo_clr_74x24dp.svg" alt="Logo" class="auth-logo">
            <h2>Iniciar Sesión</h2>
            <p>Acceso exclusivo para administradores</p>
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-primary full-width">Entrar al Sistema</button>
            </form>
            <p id="auth-msg" class="status-msg"></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="main-header">
            <div class="header-placeholder"></div>
            <h1>Vista Al Mar | Territorios</h1>
            <button class="btn-danger-outline" onclick="handleLogout()">Salir</button>
        </header>

        <nav class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('tab-agenda')">Agenda</button>
            <button class="tab-btn" onclick="switchTab('tab-personal')">Personal</button>
            <button class="tab-btn" onclick="switchTab('tab-territorios')">Territorios</button>
            <button class="tab-btn" onclick="switchTab('tab-config')">Grupos</button>
        </nav>

        <main class="container">
            <div id="tab-agenda" class="tab-content active"></div>
            <div id="tab-personal" class="tab-content"></div>
            <div id="tab-territorios" class="tab-content"></div>
            <div id="tab-config" class="tab-content"></div>
        </main>
    </div>


    <div id="modal-container">
        <div id="modalConductor" class="modal">
            <div class="modal-content">
                <h2 class="module-title">Registro de Conductor</h2>
                <form id="formConductor">
                    <input type="hidden" id="editIndexConductor">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <input type="text" id="cNombre" placeholder="Nombre" required>
                        <input type="text" id="cApellido" placeholder="Apellido" required>
                    </div>
                    <input type="tel" id="cTelefono" value="+58 " required style="margin-top:10px;">
                    
                    <div class="input-group" style="margin-top:10px;">
                        <label>¿Es Anciano?</label>
                        <select id="cEsAnciano" onchange="toggleGrupoAnciano()">
                            <option value="no">No</option><option value="si">Sí</option>
                        </select>
                    </div>
                    <div id="grupoSugerido" class="input-group hidden">
                        <label>Grupo Asignado</label>
                        <select id="cGrupoAsignado">
                            <option value="1">Grupo 1</option><option value="2">Grupo 2</option>
                            <option value="3">Grupo 3</option><option value="4">Grupo 4</option>
                            <option value="5">Grupo 5</option><option value="6">Grupo 6</option>
                        </select>
                    </div>

                    <div class="input-group"><label>Días Disponibles</label>
                        <div id="cDias" class="chip-group">
                            <label class="chip-item"><input type="checkbox" value="LUN"> Lun</label>
                            <label class="chip-item"><input type="checkbox" value="MAR"> Mar</label>
                            <label class="chip-item"><input type="checkbox" value="MIÉ"> Mié</label>
                            <label class="chip-item"><input type="checkbox" value="JUE"> Jue</label>
                            <label class="chip-item"><input type="checkbox" value="VIE"> Vie</label>
                            <label class="chip-item"><input type="checkbox" value="SÁB"> Sáb</label>
                            <label class="chip-item"><input type="checkbox" value="DOM"> Dom</label>
                        </div>
                    </div>
                    <div class="input-group"><label>Horarios Habituales</label>
                        <div id="cHoras" class="chip-group">
                            <label class="chip-item"><input type="checkbox" value="07:00 AM"> 7am</label>
                            <label class="chip-item"><input type="checkbox" value="09:00 AM"> 9am</label>
                            <label class="chip-item"><input type="checkbox" value="04:00 PM"> 4pm</label>
                            <label class="chip-item"><input type="checkbox" value="06:30 PM"> 6:30pm</label>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;">
                        <div class="input-group"><label>Fecha Extra</label><input type="date" id="cFechaDisponible"></div>
                        <div class="input-group"><label>Fecha No Disponible</label><input type="date" id="cFechaNoDisponible"></div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn-outline" onclick="closeModal('modalConductor')">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="modalTerritorio" class="modal">
            <div class="modal-content">
                <h2 class="module-title">Configurar Territorio</h2>
                <form id="formTerritorio">
                    <input type="hidden" id="editIndexTerritorio">
                    <div style="display:grid; grid-template-columns: 1fr 3fr; gap:12px;">
                        <input type="number" id="tNumero" placeholder="N°" required>
                        <input type="text" id="tNombre" placeholder="Nombre" required>
                    </div>
                    <input type="text" id="tSubNombre" placeholder="Subterritorio (Opcional)" style="margin-top:10px;">
                    <textarea id="tLugar" placeholder="Lugar de encuentro" style="margin-top:10px; width:100%; border-radius:12px; padding:10px;"></textarea>

                    <div class="input-group" style="margin-top:10px;"><label>Días Sugeridos</label>
                        <div id="tDias" class="chip-group">
                            <label class="chip-item"><input type="checkbox" value="LUN"> Lun</label>
                            <label class="chip-item"><input type="checkbox" value="MAR"> Mar</label>
                            <label class="chip-item"><input type="checkbox" value="MIÉ"> Mié</label>
                            <label class="chip-item"><input type="checkbox" value="JUE"> Jue</label>
                            <label class="chip-item"><input type="checkbox" value="VIE"> Vie</label>
                            <label class="chip-item"><input type="checkbox" value="SÁB"> Sáb</label>
                            <label class="chip-item"><input type="checkbox" value="DOM"> Dom</label>
                        </div>
                    </div>
                    <div class="input-group"><label>Horarios Sugeridos</label>
                        <div id="tHoras" class="chip-group">
                            <label class="chip-item"><input type="checkbox" value="07:00 AM"> 7am</label>
                            <label class="chip-item"><input type="checkbox" value="09:00 AM"> 9am</label>
                            <label class="chip-item"><input type="checkbox" value="04:00 PM"> 4pm</label>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn-outline" onclick="closeModal('modalTerritorio')">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="modalGrupo" class="modal">
            <div class="modal-content">
                <h2 class="module-title">Registrar Grupo</h2>
                <form id="formGrupo">
                    <input type="hidden" id="editIndexGrupo">
                    <div class="input-group">
                        <label>Número de Grupo</label>
                        <select id="gNumero"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
                    </div>
                    <div class="input-group">
                        <label>Encargado</label>
                        <input type="text" id="gEncargado" placeholder="Nombre del encargado">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline" onclick="closeModal('modalGrupo')">Cerrar</button>
                        <button type="submit" class="btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="modalHistorial" class="modal">
            <div class="modal-content">
                <h2 class="module-title">Historial Guardado</h2>
                <div id="listaHistorial"></div>
                <div class="modal-footer"><button class="btn-outline" onclick="closeModal('modalHistorial')">Cerrar</button></div>
            </div>
        </div>
    </div>

    <datalist id="dl-conductores"></datalist>
    <datalist id="dl-territorios"></datalist>

    <script src="js/auth.js"></script>
    <script src="js/ui_loader.js"></script>
    <script src="js/app.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
