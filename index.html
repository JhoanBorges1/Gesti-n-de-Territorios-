<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Territorios Vista Al Mar</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-red: #ea4335;
            --google-yellow: #fbbc04;
            --google-green: #34a853;
            --gemini-bg: #f8f9fa;
            --gemini-card: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border-radius: 24px;
            --shadow: 0 1px 2px 0 rgba(60,64,67,0.3);
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--gemini-bg); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 50px; 
        }

        /* --- UI COMPONENTS --- */
        header { 
            background: var(--gemini-card); 
            padding: 15px 20px; 
            box-shadow: var(--shadow); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        h1 { 
            font-family: 'Google Sans', sans-serif; 
            color: var(--google-blue); 
            margin: 0; 
            font-size: 1.2rem; 
        }

        .container { max-width: 900px; margin: 32px auto; padding: 0 15px; }
        
        .module-section { 
            background: var(--gemini-card); 
            border-radius: var(--border-radius); 
            padding: 24px; 
            margin-bottom: 24px; 
            border: 1px solid #dadce0; 
        }

        .module-title { 
            font-family: 'Google Sans', sans-serif; 
            font-size: 1.2rem; 
            margin-bottom: 20px; 
            color: var(--text-main); 
            border-bottom: 1px solid #f1f3f4; 
            padding-bottom: 10px; 
        }

        /* --- TABS --- */
        .tab-bar { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .tab-btn { 
            background: none; 
            border: 1px solid transparent; 
            padding: 10px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-family: 'Google Sans';
        }
        .tab-btn.active { background: #e8f0fe; color: var(--google-blue); border-color: #d2e3fc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- TABLES & EXPORT --- */
        #areaExportar { padding: 30px; background: #fff; border-radius: 12px; width: 850px; margin: 0 auto; box-sizing: border-box; }
        .export-header { border-bottom: 2px solid var(--google-blue); padding-bottom: 15px; text-align: center; margin-bottom: 25px; }
        
        .agenda-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
        .agenda-table th { background: #f1f3f4; padding: 12px; font-weight: 900; text-transform: uppercase; border-bottom: 1px solid #e0e0e0; }
        .agenda-table td { padding: 12px; border-bottom: 1px solid #f1f3f4; text-align: center; outline: none; }
        .day-separator td { border-top: 3px solid var(--google-blue); }

        /* --- CARDS & CHIPS --- */
        .group-card { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            background: #fff; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            margin-bottom: 8px; 
        }
        .subterritorio-badge { background: #e8f0fe; color: var(--google-blue); padding: 2px 8px; border-radius: 8px; font-size: 0.75rem; }
        
        /* --- UTILS --- */
        .hidden { display: none !important; }
        button { border-radius: 28px; border: none; font-family: 'Google Sans', sans-serif; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--google-blue); color: white; padding: 12px 24px; }
        .btn-outline { background: white; border: 1px solid #dadce0; color: var(--google-blue); padding: 10px 20px; }
        .btn-danger-outline { border: 1px solid var(--google-red); color: var(--google-red); background: #fff; padding: 6px 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(32, 33, 36, 0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 650px; border-radius: 28px; padding: 32px; max-height: 90vh; overflow-y: auto; }
        
        /* --- LOGIN STYLES --- */
        #auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8f9fa; }
        .login-card { background: white; padding: 40px; border-radius: 28px; border: 1px solid #dadce0; width: 350px; text-align: center; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="login-card">
        <h2 style="color: var(--google-blue);">Iniciar Sesión</h2>
        <p style="color: var(--text-sub); font-size: 0.9rem;">Acceso exclusivo</p>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="email" id="email" placeholder="Correo" required style="padding:12px; border-radius:12px; border:1px solid #ddd;">
            <input type="password" id="password" placeholder="Contraseña" required style="padding:12px; border-radius:12px; border:1px solid #ddd;">
            <button type="submit" class="btn-primary">Entrar al Sistema</button>
        </form>
        <p id="auth-msg" style="color: var(--google-red); margin-top: 10px;"></p>
    </div>
</div>

<div id="app-content" class="hidden">
    <header>
        <div style="width: 80px;"></div>
        <h1>Vista Al Mar</h1>
        <button class="btn-danger-outline" onclick="handleLogout()">Salir</button>
    </header>

    <nav class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('tab-agenda')">Agenda</button>
        <button class="tab-btn" onclick="switchTab('tab-personal')">Personal</button>
        <button class="tab-btn" onclick="switchTab('tab-territorios')">Territorios</button>
        <button class="tab-btn" onclick="switchTab('tab-config')">Grupos</button>
    </nav>

    <div class="container">
        <div id="tab-agenda" class="tab-content active">
            <section class="module-section">
                <div class="module-title">Generación de Agenda</div>
                <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                    <div style="flex-grow: 1;">
                        <label style="font-size: 0.8rem; color: var(--text-sub);">Mes de trabajo</label>
                        <select id="mesAgenda" onchange="cargarAgendaDelMes()" style="padding:12px; width:100%; border-radius:12px;">
                            <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                            <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                            <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                            <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="generarNuevaAgenda()">Generar</button>
                    <button class="btn-outline" onclick="openModal('modalHistorial')">Historial</button>
                    <button id="btn-sync-save" class="btn-primary" style="background: var(--google-green);" onclick="guardarSincronizar()">Sincronizar</button>
                </div>

                <div id="resultadoAgenda" class="hidden" style="margin-top: 25px;">
                    <div id="areaExportar">
                        <div class="export-header">
                            <h2 id="tituloExportar">Agenda de Predicación</h2>
                            <p id="fechaActualDisplay"></p>
                        </div>
                        <table class="agenda-table">
                            <thead>
                                <tr><th>Día</th><th>Fecha</th><th>Hora</th><th>Conductor</th><th>Territorio</th><th>Lugar</th><th>Grupos</th></tr>
                            </thead>
                            <tbody id="tablaCuerpoAgenda"></tbody>
                        </table>
                    </div>
                    <div style="margin-top: 20px; display: flex; gap: 10px;">
                        <select id="rangoExportar" style="padding:10px; border-radius:12px;">
                            <option value="mes">Mes Completo</option>
                            <option value="sem1">Semana 1</option>
                            <option value="sem2">Semana 2</option>
                            <option value="sem3">Semana 3</option>
                            <option value="sem4">Semana 4</option>
                        </select>
                        <button class="btn-outline" onclick="descargarImagen()">Descargar PNG</button>
                        <button class="btn-primary" onclick="guardarEnHistorial()">Oficializar Agenda</button>
                    </div>
                </div>
            </section>
        </div>

        <div id="tab-personal" class="tab-content">
            <section class="module-section">
                <div class="module-title">Conductores</div>
                <button class="btn-primary" onclick="openModalConductor()">+ Agregar</button>
                <div id="listaConductores" style="margin-top:20px;"></div>
            </section>
        </div>

        <div id="tab-territorios" class="tab-content">
            <section class="module-section">
                <div class="module-title">Territorios</div>
                <button class="btn-primary" onclick="openModalTerritorio()">+ Agregar</button>
                <div id="listaTerritorios" style="margin-top:20px;"></div>
            </section>
        </div>

        <div id="tab-config" class="tab-content">
            <section class="module-section">
                <div class="module-title">Grupos de Predicación</div>
                <button class="btn-primary" onclick="openModalGrupo()">+ Nuevo Grupo</button>
                <div id="listaGrupos" style="margin-top:20px;"></div>
            </section>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // --- CONFIGURACIÓN DE SUPABASE (REEMPLAZA ESTO) ---
    const supabaseUrl = 'TU_URL_DE_SUPABASE';
    const supabaseKey = 'TU_ANON_KEY';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // VARIABLES GLOBALES
    let conductores = [], territorios = [], grupos = [], historialAgendas = {}, agendasMaestras = {};
    const MATRIZ_HORARIOS = {
        "LUN": ["09:00 AM", "04:00 PM"], "MAR": ["09:00 AM", "04:00 PM"],
        "MIÉ": ["09:00 AM"], "JUE": ["09:00 AM", "04:00 PM", "06:30 PM"],
        "VIE": ["09:00 AM", "04:00 PM"], "SÁB": ["09:00 AM"], "DOM": ["09:00 AM"]
    };

    // INICIO DE APP
    document.addEventListener('DOMContentLoaded', async () => {
        // Verificar si ya hay una sesión activa
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            mostrarApp();
        }
    });

    // MANEJO DE LOGIN
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('auth-msg');

        msg.style.color = 'var(--google-blue)';
        msg.innerText = "Verificando acceso...";

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            msg.style.color = 'var(--google-red)';
            msg.innerText = "Error: " + error.message;
        } else {
            mostrarApp();
        }
    });

    function mostrarApp() {
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        // Aquí llamarías a cargar tus datos de Supabase
        // initData();
    }

    function handleLogout() {
        supabaseClient.auth.signOut();
        location.reload();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        localStorage.setItem('vdm_active_tab', tabId);
    }

    // Funciones "placeholder" para que no den error al cargar
    function generarNuevaAgenda() { console.log("Generando..."); }
    function cargarAgendaDelMes() { console.log("Cargando mes..."); }
</script>
</body>
</html>
