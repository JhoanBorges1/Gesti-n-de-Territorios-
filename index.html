<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Territorios Vista Al Mar</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-red: #ea4335;
            --google-yellow: #fbbc04;
            --google-green: #34a853;
            --gemini-bg: #f8f9fa;
            --gemini-card: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border-radius: 20px;
            --shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--gemini-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--gemini-card);
            padding: 16px 32px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
        }

        h1 {
            font-family: 'Google Sans', sans-serif;
            color: var(--google-blue);
            margin: 0;
            font-size: 1.4rem;
        }

        .container {
            max-width: 1000px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .module-section {
            background: var(--gemini-card);
            border-radius: var(--border-radius);
            padding: 28px;
            margin-bottom: 24px;
            border: 1px solid #dadce0;
            transition: box-shadow 0.3s;
        }

        .module-section:hover { box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .module-title {
            font-family: 'Google Sans', sans-serif;
            font-size: 1.25rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }

        button {
            padding: 10px 24px;
            border-radius: 24px;
            border: none;
            font-family: 'Google Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            font-size: 0.875rem;
        }

        .btn-primary { background: var(--google-blue); color: white; }
        .btn-primary:hover { background: #1557b0; }

        .btn-outline { background: white; border: 1px solid #dadce0; color: var(--google-blue); }
        .btn-outline:hover { background: #f8f9fa; }

        .btn-danger { background: white; border: 1px solid #f5c2c7; color: var(--google-red); }
        .btn-danger:hover { background: #fce8e6; }

        /* Form Layouts */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        label { font-size: 0.85rem; font-weight: 500; color: var(--text-sub); margin-left: 4px; }
        
        input, select, textarea {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #dadce0;
            font-size: 0.95rem;
            background: #fff;
        }
        input:focus { border: 2px solid var(--google-blue); padding: 11px 15px; outline: none; }

        /* Checkbox Styling */
        .checkbox-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            background: #f1f3f4;
            padding: 12px;
            border-radius: 12px;
        }
        .checkbox-item { font-size: 0.8rem; display: flex; align-items: center; gap: 4px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(32, 33, 36, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            border-radius: 24px;
            padding: 32px;
            overflow-y: auto;
            position: relative;
        }

        /* Lists */
        .list-container { margin-top: 16px; border-top: 1px solid #eee; }
        .list-item {
            padding: 16px;
            border-bottom: 1px solid #f1f3f4;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-info p { margin: 2px 0; font-size: 0.9rem; }
        
        .hidden { display: none; }
        .optional-badge { font-size: 0.7rem; color: var(--google-green); font-style: italic; }

    </style>
</head>
<body>

<header>
    <h1>Gestión de Territorios Vista Al Mar</h1>
</header>

<div class="container">
    
    <section class="module-section">
        <div class="module-header">
            <div class="module-title">Conductores de Grupo</div>
            <div class="btn-group">
                <button class="btn-primary" onclick="openModal('modalConductor')">Agregar Conductor</button>
                <button class="btn-outline">Editar Seleccionado</button>
                <button class="btn-danger">Eliminar</button>
                <button class="btn-outline" onclick="toggleVisibility('listaConductores')">Ver Lista Completa</button>
            </div>
        </div>
        <div id="listaConductores" class="list-container hidden">
            <div class="list-item">
                <div class="list-info">
                    <strong>Jhoan Borges</strong>
                    <p>+58 412 0000000 | Lun, Sáb, Dom</p>
                </div>
                <button class="btn-outline" style="padding: 6px 16px;">Ver Detalles / Editar</button>
            </div>
        </div>
    </section>

    <section class="module-section">
        <div class="module-header">
            <div class="module-title">Territorios Existentes</div>
            <div class="btn-group">
                <button class="btn-primary" onclick="openModal('modalTerritorio')">Agregar Territorio</button>
                <button class="btn-outline">Editar</button>
                <button class="btn-danger">Eliminar</button>
            </div>
        </div>
        <div id="listaTerritorios" class="list-container hidden"></div>
    </section>

    <section class="module-section">
        <div class="module-header">
            <div class="module-title">Grupos de Predicación (8)</div>
        </div>
        <div class="form-grid" id="gridGrupos">
            </div>
        <div style="margin-top:24px; text-align:right;">
            <button class="btn-primary" style="padding: 12px 40px; box-shadow: var(--shadow);">Guardar Todos los Grupos</button>
        </div>
    </section>

</div>

<div id="modalConductor" class="modal">
    <div class="modal-content">
        <h2 class="module-title" style="margin-top:0;">Nuevo Registro de Conductor</h2>
        <form>
            <div class="form-grid">
                <div class="input-group">
                    <label>Nombre</label>
                    <input type="text" placeholder="Nombre del hermano" required>
                </div>
                <div class="input-group">
                    <label>Apellido</label>
                    <input type="text" placeholder="Apellido" required>
                </div>
                <div class="input-group">
                    <label>Teléfono</label>
                    <input type="tel" value="+58 " required>
                </div>
            </div>

            <div class="input-group">
                <label>Días de conducción asignados</label>
                <div class="checkbox-container">
                    <div class="checkbox-item"><input type="checkbox"> Lun</div>
                    <div class="checkbox-item"><input type="checkbox"> Mar</div>
                    <div class="checkbox-item"><input type="checkbox"> Mié</div>
                    <div class="checkbox-item"><input type="checkbox"> Jue</div>
                    <div class="checkbox-item"><input type="checkbox"> Vie</div>
                    <div class="checkbox-item"><input type="checkbox"> Sáb</div>
                    <div class="checkbox-item"><input type="checkbox"> Dom</div>
                </div>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <label>Horarios disponibles</label>
                    <input type="text" placeholder="Ej: Mañana 8:30am">
                </div>
                <div class="input-group">
                    <label>Día extra este mes <span class="optional-badge">(Opcional)</span></label>
                    <input type="date">
                </div>
                <div class="input-group">
                    <label>Día indisponible <span class="optional-badge">(Opcional)</span></label>
                    <input type="date">
                </div>
            </div>

            <div style="margin-top:24px; display:flex; gap:12px; justify-content:flex-end;">
                <button type="button" class="btn-outline" onclick="closeModal('modalConductor')">Cerrar</button>
                <button type="submit" class="btn-primary">Guardar Conductor</button>
            </div>
        </form>
    </div>
</div>

<div id="modalTerritorio" class="modal">
    <div class="modal-content">
        <h2 class="module-title" style="margin-top:0;">Registro de Territorio</h2>
        <form>
            <div class="input-group">
                <label>Nombre / Número del Territorio</label>
                <input type="text" placeholder="Ej: Territorio 05 - Vista al Mar" required>
            </div>
            
            <div class="form-grid">
                <div class="input-group">
                    <label>Días de predicación</label>
                    <input type="text" placeholder="Ej: Sábados y Domingos">
                </div>
                <div class="input-group">
                    <label>Horarios</label>
                    <input type="text" placeholder="Ej: 9:00 AM y 4:00 PM">
                </div>
            </div>

            <div class="input-group">
                <label>Lugares de encuentro</label>
                <textarea rows="2" placeholder="Describa los puntos de reunión..."></textarea>
            </div>

            <div style="background: #f8f9fa; border: 1px dashed #dadce0; padding: 16px; border-radius: 12px; margin-bottom: 16px;">
                <label style="color:var(--google-blue)">Subterritorios</label>
                <div class="form-grid" style="margin-top:10px;">
                    <input type="text" placeholder="Nombre del subterritorio">
                    <input type="text" placeholder="Días y horarios específicos">
                </div>
            </div>

            <div style="margin-top:24px; display:flex; gap:12px; justify-content:flex-end;">
                <button type="button" class="btn-outline" onclick="closeModal('modalTerritorio')">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar Territorio</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleVisibility(id) { document.getElementById(id).classList.toggle('hidden'); }

    // Generador de Grupos (1 al 8)
    const gridGrupos = document.getElementById('gridGrupos');
    for (let i = 1; i <= 8; i++) {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.style.padding = '16px';
        div.style.background = '#fff';
        div.style.border = '1px solid #dadce0';
        div.style.borderRadius = '12px';
        div.innerHTML = `
            <label style="color:var(--google-blue); font-weight:bold; font-size:1rem;">Grupo ${i}</label>
            <label style="font-size:0.75rem; margin-top:8px;">Anciano responsable:</label>
            <select>
                <option value="">Seleccionar anciano...</option>
                <option value="1">Hermano Pérez</option>
                <option value="2">Hermano García</option>
            </select>
            <p style="font-size:0.65rem; color:var(--text-sub); margin-top:8px;">* Se asignará automáticamente como conductor el último sábado del mes.</p>
        `;
        gridGrupos.appendChild(div);
    }

    window.onclick = function(e) {
        if (e.target.className === 'modal') {
            e.target.style.display = 'none';
        }
    }
</script>
</body>
</html>
