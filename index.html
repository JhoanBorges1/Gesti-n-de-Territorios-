<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Territorios Vista Al Mar</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-red: #ea4335;
            --google-yellow: #fbbc04;
            --google-green: #34a853;
            --gemini-bg: #f8f9fa;
            --gemini-card: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border-radius: 24px;
        }

        body { font-family: 'Roboto', sans-serif; background-color: var(--gemini-bg); color: var(--text-main); margin: 0; }
        header { background: var(--gemini-card); padding: 20px; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); text-align: center; }
        h1 { font-family: 'Google Sans', sans-serif; color: var(--google-blue); margin: 0; font-size: 1.4rem; }
        
        .container { max-width: 800px; margin: 32px auto; padding: 0 16px; }
        .module-section { background: var(--gemini-card); border-radius: var(--border-radius); padding: 24px; margin-bottom: 24px; border: 1px solid #dadce0; }
        .module-title { font-family: 'Google Sans', sans-serif; font-size: 1.2rem; margin-bottom: 20px; color: var(--text-main); border-bottom: 1px solid #f1f3f4; padding-bottom: 10px; }

        .btn-vertical-group { display: flex; flex-direction: column; gap: 12px; }
        button { padding: 12px 24px; border-radius: 28px; border: none; font-family: 'Google Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; width: 100%; max-width: 300px; }
        
        .btn-primary { background: var(--google-blue); color: white; }
        .btn-outline { background: white; border: 1px solid #dadce0; color: var(--google-blue); }
        .btn-danger-outline { background: white; border: 1px solid #f5c2c7; color: var(--google-red); width: auto; padding: 6px 12px; font-size: 0.75rem; }

        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        label { font-size: 0.85rem; font-weight: 500; color: var(--text-sub); }
        input, select, textarea { padding: 12px; border-radius: 12px; border: 1px solid #dadce0; font-size: 0.95rem; background: white; }

        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; background: #f8f9fa; padding: 12px; border-radius: 12px; border: 1px solid #eee; }
        .chip-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; background: white; padding: 4px 10px; border-radius: 16px; border: 1px solid #dadce0; cursor: pointer; }
        .chip-item input { margin: 0; width: auto; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(32, 33, 36, 0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 650px; max-height: 90vh; border-radius: 28px; padding: 32px; overflow-y: auto; }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        .modal-footer button { width: auto; }

        .hidden { display: none; }
        
        .group-card { border: 1px solid #eee; padding: 16px; border-radius: 16px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .sub-section { background: #f1f3f4; padding: 20px; border-radius: 20px; margin-top: 15px; border-left: 4px solid var(--google-blue); }

        /* Estilos Agenda */
        .agenda-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 16px; background: white; }
        .agenda-table th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; text-align: left; color: var(--text-sub); }
        .agenda-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .agenda-table input { border: none; width: 100%; padding: 4px; background: transparent; font-family: inherit; font-size: inherit; }
        .agenda-table input:focus { outline: 1px solid var(--google-blue); border-radius: 4px; background: #fff; }
    </style>
</head>
<body>

<header><h1>Gestión de Territorios Vista Al Mar</h1></header>

<div class="container">
    <section class="module-section">
        <div class="module-title">Conductores</div>
        <div class="btn-vertical-group">
            <button class="btn-primary" onclick="openModal('modalConductor')">Agregar Conductor</button>
            <button class="btn-outline" onclick="toggleVisibility('listaConductores')">Ver Lista y Editar</button>
        </div>
        <div id="listaConductores" class="hidden" style="margin-top:16px;">
            <div class="group-card">
                <div><strong>Jhoan Borges</strong><br><small>Grupo 3 (Anciano)</small></div>
                <button class="btn-danger-outline">Eliminar</button>
            </div>
        </div>
    </section>

    <section class="module-section">
        <div class="module-title">Territorios</div>
        <div class="btn-vertical-group">
            <button class="btn-primary" onclick="openModal('modalTerritorio')">Agregar Territorio</button>
            <button class="btn-outline" onclick="toggleVisibility('listaTerritorios')">Ver Lista y Editar</button>
        </div>
        <div id="listaTerritorios" class="hidden" style="margin-top:16px;"></div>
    </section>

    <section class="module-section">
        <div class="module-title">Grupos de Predicación</div>
        <div class="btn-vertical-group">
            <button class="btn-primary" onclick="openModal('modalGrupo')">Agregar Grupo</button>
            <button class="btn-outline" onclick="toggleVisibility('listaGrupos')">Ver Grupos Registrados</button>
        </div>
        <div id="listaGrupos" class="hidden" style="margin-top:16px;"></div>
    </section>

    <section class="module-section">
        <div class="module-title">Generación de Territorios</div>
        <div class="btn-vertical-group">
            <div class="input-group">
                <label>Seleccionar mes (2026)</label>
                <select id="mesAgenda" style="max-width: 300px;">
                    <option value="1">Enero</option>
                    <option value="2">Febrero</option>
                    <option value="3">Marzo</option>
                    <option value="4">Abril</option>
                    <option value="5">Mayo</option>
                    <option value="6">Junio</option>
                    <option value="7">Julio</option>
                    <option value="8">Agosto</option>
                    <option value="9">Septiembre</option>
                    <option value="10">Octubre</option>
                    <option value="11">Noviembre</option>
                    <option value="12">Diciembre</option>
                </select>
            </div>
            <button class="btn-primary" onclick="toggleVisibility('resultadoAgenda')">Generar</button>
        </div>

        <div id="resultadoAgenda" class="hidden" style="margin-top: 24px;">
            <div id="areaExportar" style="padding: 10px; background: white;">
                <table class="agenda-table">
                    <thead>
                        <tr>
                            <th>Día / Fecha</th>
                            <th>Conductor</th>
                            <th>Territorio</th>
                            <th>Lugar de encuentro</th>
                            <th>Grupos</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="text" value="Sábado 04/04"></td>
                            <td><input type="text" value="Jhoan Borges"></td>
                            <td><input type="text" value="Sector 1"></td>
                            <td><input type="text" value="Plaza Central"></td>
                            <td><input type="text" value="Todos"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
                <button id="btnPDF" class="btn-outline" style="max-width: 200px;">Guardar en PDF</button>
                <button id="btnImagen" class="btn-outline" style="max-width: 200px;">Guardar Imagen</button>
            </div>
        </div>
    </section>
</div>

<div id="modalConductor" class="modal">
    <div class="modal-content">
        <h2 class="module-title">Registro de Conductor</h2>
        <form>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <div class="input-group"><label>Nombre</label><input type="text" placeholder="Ej: Jhoan" required></div>
                <div class="input-group"><label>Apellido</label><input type="text" placeholder="Ej: Borges" required></div>
            </div>
            <div class="input-group"><label>Teléfono</label><input type="tel" value="+58 " required></div>
            <div class="input-group">
                <label>¿Es Anciano?</label>
                <select onchange="document.getElementById('grupoSugerido').classList.toggle('hidden', this.value !== 'si')">
                    <option value="no">No</option>
                    <option value="si">Sí</option>
                </select>
            </div>
            <div id="grupoSugerido" class="input-group hidden">
                <label>Asignar a Grupo:</label>
                <select><script>for(let i=1;i<=8;i++) document.write(`<option value="${i}">Grupo ${i}</option>`);</script></select>
            </div>
            <div class="input-group">
                <label>Días de conducción habituales</label>
                <div class="chip-group">
                    <script>['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(d => document.write(`<label class="chip-item"><input type="checkbox"> ${d}</label>`));</script>
                </div>
            </div>
            <div class="input-group">
                <label>Horarios Disponibles</label>
                <div class="chip-group">
                    <label class="chip-item"><input type="checkbox"> 7:00 am</label>
                    <label class="chip-item"><input type="checkbox"> 9:00 am</label>
                    <label class="chip-item"><input type="checkbox"> 11:00 am (Dom)</label>
                    <label class="chip-item"><input type="checkbox"> 4:00 pm</label>
                    <label class="chip-item"><input type="checkbox"> 6:30 pm (TG Lun/Vie)</label>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <div class="input-group"><label>Fecha con disponibilidad</label><input type="date"></div>
                <div class="input-group"><label>Fecha no disponible</label><input type="date"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-outline" onclick="closeModal('modalConductor')">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar Conductor</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleVisibility(id) { document.getElementById(id).classList.toggle('hidden'); }
    window.onclick = function(e) { if (e.target.className === 'modal') e.target.style.display = 'none'; }

    // Lógica para exportar Imagen
    document.getElementById('btnImagen').addEventListener('click', async () => {
        const area = document.getElementById('areaExportar');
        const canvas = await html2canvas(area, { scale: 2 });
        const link = document.createElement('a');
        link.download = 'agenda-territorios.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

    // Lógica para exportar PDF
    document.getElementById('btnPDF').addEventListener('click', async () => {
        const { jsPDF } = window.jspdf;
        const area = document.getElementById('areaExportar');
        const canvas = await html2canvas(area, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgProps = pdf.getImageProperties(imgData);
        const pdfWidth = pdf.internal.pageSize.getWidth() - 20;
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        
        pdf.text("Agenda de Predicación - Vista Al Mar", 10, 10);
        pdf.addImage(imgData, 'PNG', 10, 20, pdfWidth, pdfHeight);
        pdf.save('agenda-territorios.pdf');
    });
</script>

</body>
</html>
