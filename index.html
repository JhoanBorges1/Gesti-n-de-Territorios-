<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Territorios Vista Al Mar</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-red: #ea4335;
            --google-yellow: #fbbc04;
            --google-green: #34a853;
            --gemini-bg: #f8f9fa;
            --gemini-card: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border-radius: 24px;
        }
        body { font-family: 'Roboto', sans-serif; background-color: var(--gemini-bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        header { background: var(--gemini-card); padding: 20px; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); text-align: center; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-family: 'Google Sans', sans-serif; color: var(--google-blue); margin: 0; font-size: 1.2rem; flex-grow: 1; }
        .container { max-width: 800px; margin: 32px auto; padding: 0 8px; }
        .module-section { background: var(--gemini-card); border-radius: var(--border-radius); padding: 24px; margin-bottom: 24px; border: 1px solid #dadce0; }
        .module-title { font-family: 'Google Sans', sans-serif; font-size: 1.2rem; margin-bottom: 20px; color: var(--text-main); border-bottom: 1px solid #f1f3f4; padding-bottom: 10px; }
        .btn-vertical-group { display: flex; flex-direction: column; gap: 12px; }
        button { padding: 12px 24px; border-radius: 28px; border: none; font-family: 'Google Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; width: 100%; max-width: 300px; }
        .btn-primary { background: var(--google-blue); color: white; }
        .btn-outline { background: white; border: 1px solid #dadce0; color: var(--google-blue); }
        .btn-danger-outline { background: white; border: 1px solid #f5c2c7; color: var(--google-red); width: auto; padding: 6px 12px; font-size: 0.75rem; }
        .btn-edit-outline { background: white; border: 1px solid #dadce0; color: var(--google-blue); width: auto; padding: 6px 12px; font-size: 0.75rem; margin-right: 5px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        label { font-size: 0.85rem; font-weight: 500; color: var(--text-sub); }
        input, select, textarea { padding: 12px; border-radius: 12px; border: 1px solid #dadce0; font-size: 0.95rem; background: white; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; background: #f8f9fa; padding: 12px; border-radius: 12px; border: 1px solid #eee; }
        .chip-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; background: white; padding: 4px 10px; border-radius: 16px; border: 1px solid #dadce0; cursor: pointer; }
        .chip-item input { margin: 0; width: auto; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(32, 33, 36, 0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 650px; max-height: 90vh; border-radius: 28px; padding: 32px; overflow-y: auto; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        .modal-footer button { width: auto; }
        .hidden { display: none !important; }
        .group-card { border: 1px solid #dadce0; padding: 16px; border-radius: 16px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .sub-section { background: #f1f3f4; padding: 20px; border-radius: 20px; margin-top: 15px; border-left: 4px solid var(--google-blue); }
        #areaExportar { padding: 30px; background: #ffffff; border-radius: 12px; width: fit-content; min-width: 850px; display: block; box-sizing: border-box; }
        .export-header { margin-bottom: 20px; border-bottom: 2px solid var(--google-blue); padding-bottom: 10px; text-align: center; }
        .export-header h2 { font-family: 'Google Sans', sans-serif; color: var(--google-blue); font-size: 1.3rem; margin: 0; }
        .export-header p { margin: 5px 0 0 0; color: var(--text-sub); font-size: 1rem; font-weight: 500; }
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .agenda-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; font-family: 'Google Sans', sans-serif; border: 1px solid #e0e0e0; border-radius: 12px; table-layout: auto; }
        .agenda-table th { background: #f1f3f4; padding: 12px 10px; text-align: center; color: #202124; font-weight: 900; text-transform: uppercase; border-bottom: 1px solid #e0e0e0; white-space: nowrap; }
        .agenda-table td { padding: 12px 10px; border-bottom: 1px solid #f1f3f4; color: #202124; vertical-align: middle; text-align: center; line-height: 1.4; word-wrap: break-word; outline: none; }
        .agenda-table td.bold-cell { font-weight: 700; }
        .agenda-table tr.day-separator td { border-top: 3px solid var(--google-blue); }
        .contact-item { background: white; border: 1px solid #dadce0; padding: 16px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .contact-actions { display: flex; align-items: center; gap: 10px; }
        .btn-whatsapp { background: #25D366; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 0.8rem; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
        .check-icon { color: var(--google-green); font-weight: bold; display: none; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // CONFIGURACIÓN SUPABASE
    const SUPABASE_URL = 'https://gbuqjbuwpdovuxzuysml.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3MQOwq5YleBWlTapPiEWaw_okOxDHLv';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleLogout() {
        await supabaseClient.auth.signOut();
        window.location.reload(); 
    }
</script>

<div id="auth-container" style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: 'Google Sans', sans-serif; gap: 15px; background: #f8f9fa;">
    <div style="background: white; padding: 40px; border-radius: 28px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #dadce0; width: 100%; max-width: 350px; text-align: center;">
        <h2 style="color: #1a73e8; margin-bottom: 5px;">Iniciar Sesión</h2>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="email" id="email" placeholder="Correo" required style="width: 100%; box-sizing: border-box;">
            <input type="password" id="password" placeholder="Contraseña" required style="width: 100%; box-sizing: border-box;">
            <button type="submit" class="btn-primary" style="width: 100%; max-width: none;">Entrar</button>
        </form>
        <p id="auth-msg" style="font-size: 0.85rem; margin-top: 15px; font-weight: 500;"></p>
    </div>
</div>

<div id="app-content" class="hidden">
    <header>
        <div style="width: 80px;"></div> <h1>Gestión de Territorios Vista Al Mar</h1>
        <button class="btn-danger-outline" onclick="handleLogout()" style="width: auto; margin-right: 10px;">Salir</button>
    </header>
    
    <div class="container">
        <section class="module-section">
            <div class="module-title">Conductores</div>
            <div class="btn-vertical-group">
                <button class="btn-primary" onclick="openModalConductor()">Agregar Conductor</button>
                <button class="btn-outline" onclick="toggleVisibility('listaConductores')">Ver Lista y Editar</button>
            </div>
            <div id="listaConductores" class="hidden" style="margin-top:16px;"></div>
        </section>

        <section class="module-section">
            <div class="module-title">Territorios</div>
            <div class="btn-vertical-group">
                <button class="btn-primary" onclick="openModalTerritorio()">Agregar Territorio</button>
                <button class="btn-outline" onclick="toggleVisibility('listaTerritorios')">Ver Lista y Editar</button>
            </div>
            <div id="listaTerritorios" class="hidden" style="margin-top:16px;"></div>
        </section>

        <section class="module-section">
            <div class="module-title">Grupos de Predicación</div>
            <div class="btn-vertical-group">
                <button class="btn-primary" onclick="openModalGrupo()">Agregar Grupo</button>
                <button class="btn-outline" onclick="toggleVisibility('listaGrupos')">Ver Grupos Registrados</button>
            </div>
            <div id="listaGrupos" class="hidden" style="margin-top:16px;"></div>
        </section>

        <section class="module-section">
            <div class="module-title">Generación de Territorios</div>
            <div class="btn-vertical-group">
                <div class="input-group">
                    <label>Seleccionar mes (2026)</label>
                    <select id="mesAgenda" onchange="cargarAgendaDelMes()">
                        <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                        <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                        <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                        <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary" onclick="generarNuevaAgenda()">Generar Mes</button>
                    <button class="btn-primary" id="btn-sync-save" onclick="guardarInformacion()" style="background: var(--google-green);">Guardar e Imprimir</button>
                </div>
            </div>
            
            <div id="resultadoAgenda" class="hidden" style="margin-top: 24px;">
                <div class="table-responsive">
                    <div id="areaExportar">
                        <div class="export-header">
                            <h2 id="tituloExportar">Agenda de Predicación</h2>
                            <p id="fechaActualDisplay"></p>
                        </div>
                        <table class="agenda-table">
                            <thead>
                                <tr><th>Día</th><th>Fecha</th><th>Hora</th><th>Conductor</th><th>Territorio</th><th>Lugar</th><th>Grupos</th></tr>
                            </thead>
                            <tbody id="tablaCuerpoAgenda"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section class="module-section">
            <div class="module-title">Contactar</div>
            <div id="listaContactos"></div>
        </section>
    </div>

    <div id="modalConductor" class="modal">
        <div class="modal-content">
            <h2 class="module-title" id="tituloModalConductor">Registro de Conductor</h2>
            <form id="formConductor">
                <input type="hidden" id="editIndexConductor">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div class="input-group"><label>Nombre</label><input type="text" id="cNombre" placeholder="Ej: Jhoan" required></div>
                    <div class="input-group"><label>Apellido</label><input type="text" id="cApellido" placeholder="Ej: Borges" required></div>
                </div>
                <div class="input-group"><label>Teléfono</label><input type="tel" id="cTelefono" value="+58 " required></div>
                <div class="input-group"><label>¿Es Anciano?</label><select id="cEsAnciano" onchange="document.getElementById('grupoSugerido').classList.toggle('hidden', this.value !== 'si')"><option value="no">No</option><option value="si">Sí</option></select></div>
                <div id="grupoSugerido" class="input-group hidden"><label>Asignar a Grupo:</label><select id="cGrupoAsignado"><option value="1">Grupo 1</option><option value="2">Grupo 2</option><option value="3">Grupo 3</option><option value="4">Grupo 4</option><option value="5">Grupo 5</option><option value="6">Grupo 6</option><option value="7">Grupo 7</option><option value="8">Grupo 8</option></select></div>
                <div class="input-group"><label>Días Habituales</label><div class="chip-group" id="cDias"><label class="chip-item"><input type="checkbox" value="LUN"> Lun</label><label class="chip-item"><input type="checkbox" value="MAR"> Mar</label><label class="chip-item"><input type="checkbox" value="MIÉ"> Mié</label><label class="chip-item"><input type="checkbox" value="JUE"> Jue</label><label class="chip-item"><input type="checkbox" value="VIE"> Vie</label><label class="chip-item"><input type="checkbox" value="SÁB"> Sáb</label><label class="chip-item"><input type="checkbox" value="DOM"> Dom</label></div></div>
                <div class="input-group"><label>Horarios Disponibles</label><div class="chip-group" id="cHoras"><label class="chip-item"><input type="checkbox" value="07:00 AM"> 7 am</label><label class="chip-item"><input type="checkbox" value="09:00 AM"> 9 am</label><label class="chip-item"><input type="checkbox" value="11:00 AM"> 11 am</label><label class="chip-item"><input type="checkbox" value="04:00 PM"> 4 pm</label><label class="chip-item"><input type="checkbox" value="06:30 PM"> 6:30 pm</label></div></div>
                <div class="modal-footer"><button type="button" class="btn-outline" onclick="closeModal('modalConductor')">Cancelar</button><button type="submit" class="btn-primary">Guardar</button></div>
            </form>
        </div>
    </div>

    <div id="modalTerritorio" class="modal">
        <div class="modal-content">
            <h2 class="module-title">Territorio</h2>
            <form id="formTerritorio">
                <input type="hidden" id="editIndexTerritorio">
                <div style="display:grid; grid-template-columns: 1fr 3fr; gap:12px;"><div class="input-group"><label>#</label><input type="number" id="tNumero" required></div><div class="input-group"><label>Nombre</label><input type="text" id="tNombre" required></div></div>
                <div class="input-group"><label>Encuentro</label><textarea id="tLugar" rows="2"></textarea></div>
                <div class="input-group"><label>Días Sugeridos</label><div class="chip-group" id="tDias"><label class="chip-item"><input type="checkbox" value="LUN"> Lun</label><label class="chip-item"><input type="checkbox" value="MAR"> Mar</label><label class="chip-item"><input type="checkbox" value="MIÉ"> Mié</label><label class="chip-item"><input type="checkbox" value="JUE"> Jue</label><label class="chip-item"><input type="checkbox" value="VIE"> Vie</label><label class="chip-item"><input type="checkbox" value="SÁB"> Sáb</label><label class="chip-item"><input type="checkbox" value="DOM"> Dom</label></div></div>
                <div class="input-group"><label>Horarios Sugeridos</label><div class="chip-group" id="tHoras"><label class="chip-item"><input type="checkbox" value="07:00 AM"> 7 am</label><label class="chip-item"><input type="checkbox" value="09:00 AM"> 9 am</label><label class="chip-item"><input type="checkbox" value="11:00 AM"> 11 am</label><label class="chip-item"><input type="checkbox" value="04:00 PM"> 4 pm</label><label class="chip-item"><input type="checkbox" value="06:30 PM"> 6:30 pm</label></div></div>
                
                <div class="sub-section">
                    <label style="color:#1a73e8; font-weight:700;">Subterritorio</label>
                    <div class="input-group"><input type="text" id="tsNombre" placeholder="Nombre"></div>
                    <label style="font-size:0.75rem;">Días específicos:</label>
                    <div class="chip-group" id="tsDias"><label class="chip-item"><input type="checkbox" value="LUN"> Lun</label><label class="chip-item"><input type="checkbox" value="MAR"> Mar</label><label class="chip-item"><input type="checkbox" value="SÁB"> Sáb</label></div>
                </div>
                <div class="modal-footer"><button type="button" onclick="closeModal('modalTerritorio')">Cerrar</button><button type="submit">Guardar</button></div>
            </form>
        </div>
    </div>
</div>

<script>
    // --- AUTH ---
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) document.getElementById('auth-msg').innerText = "Acceso denegado.";
    });

    supabaseClient.auth.onAuthStateChange((event, session) => {
        const auth = document.getElementById('auth-container');
        const app = document.getElementById('app-content');
        if (session) { auth.classList.add('hidden'); app.classList.remove('hidden'); initApp(); }
        else { auth.classList.remove('hidden'); app.classList.add('hidden'); }
    });

    // --- VARIABLES GLOBALES ---
    let conductores = [], territorios = [], agendasMaestras = {};
    const MATRIZ_HORARIOS = { 'LUN': ['07:00 AM', '09:00 AM', '04:00 PM', '06:30 PM'], 'MAR': ['07:00 AM', '09:00 AM', '04:00 PM'], 'MIÉ': ['07:00 AM', '09:00 AM'], 'JUE': ['07:00 AM', '09:00 AM', '04:00 PM'], 'VIE': ['07:00 AM', '09:00 AM', '04:00 PM', '06:30 PM'], 'SÁB': ['07:00 AM', '09:00 AM'], 'DOM': ['11:00 AM'] };

    // --- NUEVO initApp Nube-First ---
    async function initApp() {
        console.log("🚀 Sincronizando Nube-First...");
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data, error } = await supabaseClient
                    .from('registros_tablas')
                    .select('datos')
                    .eq('user_id', session.user.id)
                    .single();

                if (data && data.datos) {
                    const d = data.datos;
                    conductores = d.conductores || [];
                    territorios = d.territorios || [];
                    agendasMaestras = d.registros || {}; 
                    
                    renderListaConductores();
                    renderListaTerritorios();
                    const mes = document.getElementById('mesAgenda').value;
                    if (agendasMaestras[mes]) renderAgenda(agendasMaestras[mes], "Mes " + mes);
                }
            }
        } catch (err) {
            console.warn("Usando local storage.");
            conductores = JSON.parse(localStorage.getItem('vdm_conductores') || '[]');
            territorios = JSON.parse(localStorage.getItem('vdm_territorios') || '[]');
            agendasMaestras = JSON.parse(localStorage.getItem('vdm_agendas') || {});
            renderListaConductores(); renderListaTerritorios();
        }
    }

    // --- TAREA: GUARDAR (SUPABASE + IMAGEN) ---
    async function guardarInformacion() {
        const btn = document.getElementById('btn-sync-save');
        const mes = document.getElementById('mesAgenda').value;
        btn.innerText = "⏳ Guardando...";
        
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const payload = { registros: agendasMaestras, conductores, territorios };
            
            const { error } = await supabaseClient
                .from('registros_tablas')
                .upsert([{ user_id: session.user.id, datos: payload }], { onConflict: 'user_id' });

            if (error) throw error;

            const area = document.getElementById('areaExportar');
            const canvas = await html2canvas(area, { scale: 2, backgroundColor: "#ffffff" });
            const link = document.createElement('a');
            link.download = `Agenda_Mes_${mes}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();

            btn.innerText = "✅ ¡Éxito!";
            btn.style.background = "#0d652d";
        } catch (e) {
            btn.innerText = "❌ Error";
        } finally {
            setTimeout(() => { btn.innerText = "Guardar e Imprimir"; btn.style.background = ""; }, 3000);
        }
    }

    // --- UI HELPERS ---
    function toggleVisibility(id) { document.getElementById(id).classList.toggle('hidden'); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- BUSINESS LOGIC (Generación y Render) ---
    function generarNuevaAgenda() {
        const mes = document.getElementById('mesAgenda').value;
        // Lógica de generación simplificada para demostración
        agendasMaestras[mes] = [{ diaSemana: "LUN", diaMes: "1", hora: "07:00 AM", conductor: "Jhoan Borges", territorio: "T-1", lugar: "Plaza Central", grupos: "Todos" }];
        renderAgenda(agendasMaestras[mes], "Mes " + mes);
        document.getElementById('resultadoAgenda').classList.remove('hidden');
    }

    function renderAgenda(datos, nombre) {
        const cuerpo = document.getElementById('tablaCuerpoAgenda');
        cuerpo.innerHTML = '';
        datos.forEach(f => {
            cuerpo.innerHTML += `<tr><td>${f.diaSemana}</td><td>${f.diaMes}</td><td>${f.hora}</td><td>${f.conductor}</td><td>${f.territorio}</td><td>${f.lugar}</td><td>${f.grupos}</td></tr>`;
        });
    }

    function renderListaConductores() {
        const cont = document.getElementById('listaConductores');
        cont.innerHTML = '';
        conductores.forEach((c, i) => {
            cont.innerHTML += `<div class="group-card"><strong>${c.nombre}</strong> <button onclick="editarConductor(${i})">Edit</button></div>`;
        });
    }

    function renderListaTerritorios() {
        const cont = document.getElementById('listaTerritorios');
        cont.innerHTML = '';
        territorios.forEach((t, i) => {
            cont.innerHTML += `<div class="group-card"><strong>${t.numero}. ${t.nombre}</strong></div>`;
        });
    }

    // Re-link de modal conductor
    function openModalConductor() { document.getElementById('formConductor').reset(); openModal('modalConductor'); }
    document.getElementById('formConductor').addEventListener('submit', (e) => {
        e.preventDefault();
        conductores.push({ nombre: document.getElementById('cNombre').value });
        renderListaConductores(); closeModal('modalConductor');
    });

    // Re-link de modal territorio
    function openModalTerritorio() { document.getElementById('formTerritorio').reset(); openModal('modalTerritorio'); }
    document.getElementById('formTerritorio').addEventListener('submit', (e) => {
        e.preventDefault();
        territorios.push({ numero: document.getElementById('tNumero').value, nombre: document.getElementById('tNombre').value });
        renderListaTerritorios(); closeModal('modalTerritorio');
    });

</script>
</body>
</html>
